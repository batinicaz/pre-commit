name: Build
on:
  push:
    branches: ["**", "!main"]
permissions:
  contents: read
  packages: write
  security-events: write
jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      build_args: ${{ steps.versions.outputs.build_args }}
    steps:
      - uses: batinicaz/gha/.github/actions/resolve-versions@v1
        id: versions
        with:
          versions: |
            [
              {"arg": "PACKER_VERSION", "repo": "hashicorp/packer"},
              {"arg": "TERRAFORM_VERSION", "repo": "hashicorp/terraform"},
              {"arg": "TF_LINT_VERSION", "repo": "terraform-linters/tflint", "strip_v": false}
            ]
  build:
    needs: resolve-versions
    uses: batinicaz/gha/.github/workflows/docker.yml@v1
    with:
      push: false
      build_args: ${{ needs.resolve-versions.outputs.build_args }}
      smoke_test: |
        git clone --depth 1 --branch v1.5.18 https://github.com/batinicaz/oci-core /tmp/test
        sudo chown -R 65532 /tmp/test
        docker run --rm -v /tmp/test:/test -w /test "$IMAGE"
        sudo chown -R "$(id -u):$(id -g)" /tmp/test
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
